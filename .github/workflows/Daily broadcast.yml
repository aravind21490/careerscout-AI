name: 🚀 CareerScout Daily Broadcast

on:
  schedule:
    - cron: '0 5 * * *'     # 10:30 AM IST (UTC+5:30) every day
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  broadcast:
    name: Scrape & Broadcast
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run broadcast
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          ADMIN_CHAT_ID:  ${{ secrets.ADMIN_CHAT_ID }}
        run: python broadcast.py

      - name: 💾 Commit updated DB (subscribers list)
        run: |
          git config user.name  "CareerScout Bot"
          git config user.email "bot@careerscout.ai"
          git add users.db || true
          git diff --staged --quiet || git commit -m "chore: update subscribers db [skip ci]"
          git push || true
